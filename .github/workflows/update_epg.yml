name: Update EPG Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  filter_epg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # This fetches the full history to help with syncing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run Filter Script
        run: python filter_epg.py

      - name: Commit and Force Push
        run: |
          git config --global user.name "EPG-Bot"
          git config --global user.email "actions@github.com"
          git add epg.xml
          git commit -m "Automated EPG Update" || exit 0
          git push origin main --force
