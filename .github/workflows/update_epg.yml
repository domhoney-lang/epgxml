name: Update EPG Data
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  filter_epg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run Filter Script
        run: python filter_epg.py

- name: Commit and Push
        run: |
          git config --global user.name "EPG-Bot"
          git config --global user.email "actions@github.com"
          git add epg.xml
          # Pull first to avoid "rejected" errors
          git pull --rebase origin main
          git commit -m "Updated filtered EPG" || exit 0
          git push
